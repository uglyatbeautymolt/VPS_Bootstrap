server {
    listen 80;
    server_name www.beautymolt.com beautymolt.com;
    root /var/www/html;
    index index.html;
    location / { try_files $uri $uri/ =404; }
}
server {
    listen 80;
    server_name claw.beautymolt.com;
    location / {
        proxy_pass http://ugly-agent:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
server {
    listen 80;
    server_name search.beautymolt.com;
    location / {
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
    }
}
server {
    listen 80;
    server_name n8n.beautymolt.com;
    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
