[chttpd]
bind_address = any
port = 5984

[httpd]
enable_cors = true
bind_address = any

[cors]
origins = *
credentials = true
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE, OPTIONS

[chttpd_auth]
require_valid_user = true

[couchdb]
single_node = true
