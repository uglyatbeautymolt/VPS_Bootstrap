services:

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - ugly-net
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./www:/var/www/html:rw
    networks:
      - ugly-net

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    user: "1000:1000"  # node user — verhindert Volume-Ownership-Drift nach Watchtower-Updates
    restart: unless-stopped
    command: node /app/dist/index.js gateway --allow-unconfigured --bind lan
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS=["https://claw.beautymolt.com","https://claw.beautymolt.com/"]
      - OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLYALLOWHOSTHEADERORIGINFALLBACK=true
      - SEARXNG_URL=http://searxng:8080
      - BREVO_KEY=${BREVO_KEY}
      - BREVO_SMTP_USER=${BREVO_SMTP_USER}
      - BREVO_SMTP_API_KEY=${BREVO_SMTP_API_KEY}
      - TZ=${TZ}
    volumes:
      - ./openclaw-data:/home/node/.openclaw
      - ./www:/home/node/www  # Webadmin: schreibt HTML/CSS hier — nginx serviert aus /var/www/html
    labels:
      # sqlite3 nach jedem Watchtower-Update neu installieren (nicht im offiziellen Image enthalten)
      - "com.centurylinklabs.watchtower.lifecycle.post-update=/bin/sh -c 'apt-get update -qq && apt-get install -y -qq sqlite3'"
      - "com.centurylinklabs.watchtower.lifecycle.uid=0"
    networks:
      - ugly-net
    depends_on:
      - searxng

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=https://search.beautymolt.com
      - TZ=${TZ}
    networks:
      - ugly-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    user: "1000:1000"  # node user — verhindert Volume-Ownership-Drift nach Watchtower-Updates
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=https://n8n.beautymolt.com
      - N8N_SECURE_COOKIE=false
      - N8N_TRUST_PROXY=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=smtp-relay.brevo.com
      - N8N_SMTP_PORT=587
      - N8N_SMTP_USER=${BREVO_SMTP_USER}
      - N8N_SMTP_PASS=${BREVO_SMTP_API_KEY}
      - N8N_SMTP_SENDER=${BREVO_SMTP_USER}
      - TZ=${TZ}
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - ugly-net

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: unless-stopped
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://imap.zoho.eu
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=ssl://smtp.zoho.eu
      - ROUNDCUBEMAIL_SMTP_PORT=465
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_DEFAULT_USER=${ZOHO_SMTP_USER}
    volumes:
      - ./roundcube-data:/var/roundcube/db
      - ./roundcube-temp:/tmp/roundcube-temp
    networks:
      - ugly-net

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Zeitplan: 02:30 UTC (nach Backup 02:00, vor unattended-upgrades 03:00)
      - WATCHTOWER_SCHEDULE=0 30 2 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - WATCHTOWER_LIFECYCLE_HOOKS=true
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=ugly@beautymolt.com
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=alex@alexstuder.ch
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=smtp-relay.brevo.com
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=587
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${BREVO_SMTP_USER}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${BREVO_SMTP_API_KEY}
    networks:
      - ugly-net
    command: openclaw searxng nginx roundcube whisper tts

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - ugly-net
    command: --http-enabled --trusted-origins portainer.beautymolt.com

  whisper:
    image: hwdsl2/whisper-server:latest
    container_name: whisper
    restart: unless-stopped
    environment:
      - WHISPER_MODEL=small
      - WHISPER_LANGUAGE=de
    volumes:
      - whisper-models:/var/lib/whisper
    networks:
      - ugly-net

  tts:
    image: ghcr.io/matatonic/openedai-speech-min:latest
    container_name: tts
    restart: unless-stopped
    volumes:
      - ./tts-data/config:/app/config
      - ./tts-data/voices:/app/voices
    networks:
      - ugly-net

volumes:
  portainer-data:
  whisper-models:

networks:
  ugly-net:
    driver: bridge
    name: ugly-net  # expliziter Name — verhindert Prefix (ugly-stack_ugly-net), noetig fuer override external: true
